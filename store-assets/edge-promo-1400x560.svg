<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="560" fill="url(#bg)"/>
  <text x="700" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">Save As Image Type</text>
  <text x="700" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="rgba(255,255,255,0.85)">Right-click any image. Save as any format.</text>
  <rect x="320" y="300" width="120" height="50" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="380" y="332" text-anchor="middle" font-family="system-ui, monospace" font-size="24" font-weight="600" fill="white">PNG</text>
  <rect x="470" y="300" width="120" height="50" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="530" y="332" text-anchor="middle" font-family="system-ui, monospace" font-size="24" font-weight="600" fill="white">JPEG</text>
  <rect x="620" y="300" width="120" height="50" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="680" y="332" text-anchor="middle" font-family="system-ui, monospace" font-size="24" font-weight="600" fill="white">WebP</text>
