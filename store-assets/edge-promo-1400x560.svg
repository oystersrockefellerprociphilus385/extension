  <text x="980" y="332" text-anchor="middle" font-family="system-ui, monospace" font-size="24" font-weight="600" fill="white">GIF</text>
  <text x="700" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(255,255,255,0.8)">Works with WebP, AVIF, SVG and all image types</text>
  <text x="700" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(255,255,255,0.8)">100% local — no data leaves your browser</text>
